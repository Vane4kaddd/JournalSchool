{% extends 'base.html' %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4 text-white">✏️ Редактировать профиль</h2>
    <div class="card shadow-lg rounded-4 p-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="row align-items-center">
                <!-- Левая колонка: аватар -->
                <div class="col-md-4 text-center mb-3">
                    {% if current_user.profile_picture %}
                        <img src="{{ url_for('static', filename='profile_pics/' + current_user.profile_picture) }}"
                             alt="Аватар"
                             class="rounded-circle shadow"
                             style="width: 150px; height: 150px; object-fit: cover;">
                    {% else %}
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                             alt="Аватар по умолчанию"
                             class="rounded-circle shadow"
                             style="width: 150px; height: 150px; object-fit: cover;">
                    {% endif %}
                    <div class="mt-3">
                        <label for="avatar" class="form-label">Новое фото</label>
                        <input type="file" class="form-control" id="avatar" name="avatar" accept="image/*">
                    </div>
                </div>

                <!-- Правая колонка: поля -->
                <div class="col-md-8">
                    <!-- Имя -->
                    <div class="mb-3">
                        <label for="first_name" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="first_name" name="first_name"
                               value="{{ current_user.first_name }}" required>
                    </div>

                    <!-- Фамилия -->
                    <div class="mb-3">
                        <label for="last_name" class="form-label">Фамилия</label>
                        <input type="text" class="form-control" id="last_name" name="last_name"
                               value="{{ current_user.last_name }}" required>
                    </div>

                    <!-- Дата рождения -->
                    <div class="mb-3">
                        <label for="birth_date" class="form-label">Дата рождения</label>
                        <input type="date" class="form-control" id="birth_date" name="birth_date"
                            value="{{ current_user.birth_date.strftime('%Y-%m-%d') if current_user.birth_date else '' }}" required>
                    </div>

                    <!-- Кнопка -->
                    <button type="submit" class="btn btn-custom mt-3">💾 Сохранить изменения</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
